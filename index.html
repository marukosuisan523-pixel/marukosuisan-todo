<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>圓子水産 Todo Board</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #f0f4ff; font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif; overflow-x: auto; }
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #c7d2fe; border-radius: 2px; }
  input::placeholder { color: #94a3b8; }
  button { font-family: inherit; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ============================================================
// ★ 設定欄 — ここだけ編集すればOK
// ============================================================
const GAS_URL = "https://script.google.com/macros/s/AKfycbw80XwvvHwnKKefadqkluQGOi3KSqhovK_HSYepqzOfY59M970QzunYw2OCYyTLy78h/exec";
// APIキーはGAS側のScript Propertiesで安全に管理

const DEFAULT_EMPLOYEES = [
  "小川翔", "生駒ひなた", "千葉義昭", "並木じゅき",
  "白岡流衣", "田中響", "大石ゆうや"
];
// ============================================================

const STORAGE_KEY_TODOS = "marukosuisan-todos-v3";
const STORAGE_KEY_EMPLOYEES = "marukosuisan-employees-v3";

const ONBOARDING_ADMIN = (name, date) => [
  { text: "雇用契約書の作成",        priority: "high",   deadline: date || "" },
  { text: "社会保険の加入手続き",    priority: "high",   deadline: "" },
  { text: "マイナンバーの収集",      priority: "normal", deadline: "" },
  { text: "給与振込口座の確認",      priority: "normal", deadline: "" },
  { text: "健康保険証の発行確認",    priority: "normal", deadline: "" },
  { text: `${name}をマスターに登録`, priority: "high",   deadline: date || "" },
];
const ONBOARDING_MEMBER = () => [
  { text: "年金手帳を提出",   priority: "high",   deadline: "" },
  { text: "銀行口座を連絡",   priority: "high",   deadline: "" },
  { text: "マイナンバーを提出", priority: "normal", deadline: "" },
  { text: "緊急連絡先を連絡", priority: "normal", deadline: "" },
];

const PRIORITY = {
  high:   { label: "急", color: "#dc2626", bg: "rgba(239,68,68,0.12)" },
  normal: { label: "普", color: "#d97706", bg: "rgba(245,158,11,0.12)" },
  low:    { label: "低", color: "#64748b", bg: "rgba(100,116,139,0.10)" },
};
const COLORS = ["#4f6ef7","#06b6d4","#10b981","#f59e0b","#ef4444","#8b5cf6","#ec4899","#f97316","#14b8a6"];

const SYSTEM_PROMPT = `あなたは圓子水産のTodo管理AIです。
現在の社員リスト：{EMPLOYEES}
現在のTodoリスト（JSON）:
{TODOS}

ユーザーの指示に従い、以下のJSON形式のみで返答。説明文・コードブロック不要：
{"action":"update","todos":[...更新後の全Todo...],"employees":[...更新後の社員リスト...],"message":"一言で","onboarding":null}

【ルール】
- 「〇〇が入社」「〇〇を追加」 → employeesに追加 + onboardingを{"name":"名前","date":"日付"}にセット
- 「〇〇が退職」「〇〇を削除」 → employeesから削除（Todoは残す）
- 「終わったやつ消して」→ done:trueのTodoを削除
- 優先度はhigh/normal/lowのみ
各Todoの形式: {"id":number,"person":"社員名","text":"内容","priority":"high|normal|low","deadline":"例:4/1","done":false,"elapsed":0}`;

function fmt(sec) {
  const h = Math.floor(sec/3600), m = Math.floor((sec%3600)/60), s = sec%60;
  if (h) return `${h}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
  return `${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
}

function load(key, def) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : def; } catch { return def; }
}
function save(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
}

// ====== 期限チェック ======
function isOverdue(deadline) {
  if (!deadline) return false;
  const m = deadline.match(/(\d{1,2})\/(\d{1,2})/);
  if (!m) return false;
  const now = new Date();
  const year = now.getFullYear();
  const dl = new Date(year, parseInt(m[1])-1, parseInt(m[2]), 23, 59, 59);
  // 1月に12月の期限があれば前年扱い（逆に6ヶ月以上先なら前年）
  if (dl.getTime() - now.getTime() > 180*24*60*60*1000) dl.setFullYear(year - 1);
  return now > dl;
}

// ====== TodoCard ======
function TodoCard({ todo, col, onToggle, onStart, onStop, isRunning, elapsedSec, isDone, onDragStart, onMemoChange }) {
  const [showMemo, setShowMemo] = useState(false);
  const p = PRIORITY[todo.priority] || PRIORITY.normal;
  const sec = elapsedSec || todo.elapsed || 0;
  const isHigh = todo.priority === "high";
  const overdue = !isDone && isOverdue(todo.deadline);
  return (
    <div
      draggable={!isDone}
      onDragStart={e => { e.dataTransfer.setData("todoId", todo.id); if(onDragStart) onDragStart(todo.id); }}
      style={{
        background: isDone ? "#f1f5f9" : overdue ? "#fef2f2" : isHigh ? "#fffbeb" : "#ffffff",
        border: `1px solid ${isDone ? "#e2e8f0" : overdue ? "#fca5a5" : isHigh ? "#fde68a" : "#e2e8f0"}`,
        borderLeft: isDone ? undefined : `${isHigh ? "4px" : "3px"} solid ${overdue ? "#ef4444" : col}`,
        borderRadius: 10, padding: "9px 10px", opacity: isDone ? 0.5 : 1, marginBottom: 5,
        cursor: isDone ? "default" : "grab",
        boxShadow: isDone ? "none" : overdue ? "0 1px 6px rgba(239,68,68,0.15)" : isHigh ? "0 1px 6px rgba(245,158,11,0.12)" : "0 1px 3px rgba(0,0,0,0.06)",
      }}>
      <div style={{ display:"flex", alignItems:"flex-start", gap:7 }}>
        <span style={{ fontSize:9, fontWeight:700, padding:"2px 5px", borderRadius:3,
          color: overdue ? "#fff" : p.color,
          background: overdue ? "#ef4444" : isHigh ? "rgba(245,158,11,0.2)" : p.bg,
          flexShrink:0, marginTop:1 }}>{overdue ? "遅延" : p.label}</span>
        <span style={{ flex:1, fontSize:11, color: isDone?"#94a3b8": overdue?"#b91c1c":"#334155",
          textDecoration: isDone?"line-through":"none", lineHeight:1.45, fontWeight: isHigh&&!isDone?600:"normal" }}>{todo.text}</span>
        <button onClick={() => onToggle(todo.id)} style={{
          width:17, height:17, borderRadius:4, flexShrink:0,
          border: isDone?"none":"1.5px solid #cbd5e1",
          background: isDone?"#22c55e":"transparent",
          display:"flex", alignItems:"center", justifyContent:"center",
          cursor:"pointer", fontSize:10, color:"#fff" }}>{isDone?"✓":""}</button>
      </div>
      {/* メモ表示 */}
      {todo.memo && !showMemo && (
        <div onClick={() => !isDone && setShowMemo(true)} style={{
          fontSize:10, color:"#64748b", background:"#f8fafc", borderRadius:4,
          padding:"3px 6px", marginTop:5, cursor: isDone?"default":"pointer",
          borderLeft:"2px solid #cbd5e1", lineHeight:1.4 }}>
          {todo.memo}
        </div>
      )}
      {showMemo && !isDone && (
        <textarea
          autoFocus
          defaultValue={todo.memo || ""}
          onBlur={e => { onMemoChange(todo.id, e.target.value.trim()); setShowMemo(false); }}
          onKeyDown={e => { if(e.key==="Enter" && !e.shiftKey){ e.preventDefault(); e.target.blur(); }}}
          placeholder="メモを入力…"
          style={{ width:"100%", fontSize:10, color:"#334155", background:"#f8fafc",
            border:"1px solid #c7d2fe", borderRadius:4, padding:"4px 6px", marginTop:5,
            resize:"vertical", minHeight:36, outline:"none", fontFamily:"inherit", lineHeight:1.4 }}
        />
      )}
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginTop:6 }}>
        <div style={{ display:"flex", gap:8, alignItems:"center" }}>
          {todo.deadline && <span style={{ fontSize:9, color: overdue?"#dc2626":"#64748b", fontWeight: overdue?700:"normal" }}>
            {overdue?"⚠":"📅"} {todo.deadline}{overdue?" 期限切れ":""}
          </span>}
          {sec > 0 && <span style={{ fontSize:9, color: isRunning?col:"#64748b", fontVariantNumeric:"tabular-nums" }}>⏱ {fmt(sec)}</span>}
        </div>
        <div style={{ display:"flex", gap:4 }}>
          {!isDone && !showMemo && (
            <button onClick={() => setShowMemo(true)} style={{
              fontSize:8, padding:"2px 7px", borderRadius:5, cursor:"pointer",
              border:"1px solid #e2e8f0", background:"#f8fafc", color:"#64748b"
            }}>{todo.memo ? "📝" : "+ メモ"}</button>
          )}
          {!isDone && (
            <button onClick={() => isRunning ? onStop(todo.id) : onStart(todo.id)} style={{
              fontSize:8, padding:"2px 7px", borderRadius:5, cursor:"pointer",
              border:`1px solid ${isRunning?"#ef4444":col+"40"}`,
              background: isRunning?"rgba(239,68,68,0.08)":"#f8fafc",
              color: isRunning?"#ef4444":"#64748b" }}>{isRunning?"■ 停止":"▶ 開始"}</button>
          )}
        </div>
      </div>
    </div>
  );
}

// ====== メイン ======
function App() {
  const [employees, setEmployees] = useState(() => load(STORAGE_KEY_EMPLOYEES, DEFAULT_EMPLOYEES));
  const [todos, setTodos] = useState(() => {
    const raw = load(STORAGE_KEY_TODOS, []);
    const expiry = (doneAt) => { const d = new Date(doneAt); d.setDate(d.getDate()+1); d.setHours(3,0,0,0); return d.getTime(); };
    return raw.filter(t => !(t.done && t.doneAt && Date.now() > expiry(t.doneAt)));
  });
  const [timers, setTimers] = useState({});
  const [elapsed, setElapsed] = useState({});
  const [showAdmin, setShowAdmin] = useState(false);
  const [input, setInput] = useState("");
  const [messages, setMessages] = useState([]);
  const [loading, setLoading] = useState(false);
  const [feedback, setFeedback] = useState("");
  const [now, setNow] = useState(new Date());
  const [filter, setFilter] = useState(null);
  const [masterStatus, setMasterStatus] = useState(GAS_URL ? "接続中…" : "ローカルモード");
  const inputRef = useRef(null);
  const msgEnd = useRef(null);

  // 時計
  useEffect(() => { const t = setInterval(() => setNow(new Date()), 1000); return () => clearInterval(t); }, []);

  // タイマー
  useEffect(() => {
    const t = setInterval(() => {
      setElapsed(prev => {
        const u = {...prev};
        Object.entries(timers).forEach(([id, start]) => {
          const base = todos.find(td => td.id === Number(id))?.elapsed || 0;
          u[id] = Math.floor((Date.now()-start)/1000) + base;
        });
        return u;
      });
    }, 1000);
    return () => clearInterval(t);
  }, [timers, todos]);

  // GAS起動時読み込み（カレンダー同期済みTodoも取得）
  useEffect(() => {
    if (!GAS_URL) return;
    fetch(`${GAS_URL}?action=getAll`)
      .then(r => r.json())
      .then(data => {
        if (data.employees?.length) {
          setEmployees(data.employees);
          save(STORAGE_KEY_EMPLOYEES, data.employees);
        }
        if (data.todos?.length) {
          const expiry = (doneAt) => { const d = new Date(doneAt); d.setDate(d.getDate()+1); d.setHours(3,0,0,0); return d.getTime(); };
          const cleaned = data.todos.filter(t => !(t.done && t.doneAt && Date.now() > expiry(t.doneAt)));
          setTodos(cleaned);
          save(STORAGE_KEY_TODOS, cleaned);
          if (cleaned.length < data.todos.length) persist(cleaned, null);
        }
        setMasterStatus(`カレンダー連携済み（社員${data.employees?.length||0}名）`);
      })
      .catch(() => setMasterStatus("GAS接続失敗"));
  }, []);

  useEffect(() => { msgEnd.current?.scrollIntoView({behavior:"smooth"}); }, [messages]);
  useEffect(() => { if (showAdmin) setTimeout(() => inputRef.current?.focus(), 100); }, [showAdmin]);

  const flash = (msg) => { setFeedback(msg); setTimeout(() => setFeedback(""), 3000); };

  const [syncing, setSyncing] = useState(false);

  const syncNow = async () => {
    if (!GAS_URL || syncing) return;
    setSyncing(true);
    setMasterStatus("同期中…");
    try {
      const res = await fetch(`${GAS_URL}?action=syncNow`);
      const data = await res.json();
      if (data.employees?.length) { setEmployees(data.employees); save(STORAGE_KEY_EMPLOYEES, data.employees); }
      if (data.todos) { setTodos(data.todos); save(STORAGE_KEY_TODOS, data.todos); }
      const newCount = data.todos?.length || 0;
      setMasterStatus(`カレンダー連携済み（社員${data.employees?.length||0}名）`);
      flash(`🔄 同期完了（Todo ${newCount}件）`);
    } catch {
      setMasterStatus("同期失敗");
      flash("❌ 同期に失敗しました");
    }
    setSyncing(false);
  };

  const persist = (newTodos, newEmployees) => {
    const t = newTodos ?? todos;
    const e = newEmployees ?? employees;
    if (newTodos) setTodos(t);
    if (newEmployees) setEmployees(e);
    save(STORAGE_KEY_TODOS, t);
    save(STORAGE_KEY_EMPLOYEES, e);
    if (GAS_URL) {
      fetch(GAS_URL, { method:"POST", body: JSON.stringify({action:"setAll", todos:t, employees:e}) }).catch(()=>{});
    }
  };

  const genOnboarding = (name, date, curTodos, curEmp) => {
    const uid = () => Date.now() + Math.random();
    const at = ONBOARDING_ADMIN(name, date).map(t => ({id:uid(), person:"管理者", done:false, elapsed:0, ...t}));
    const mt = ONBOARDING_MEMBER().map(t => ({id:uid(), person:name, done:false, elapsed:0, ...t}));
    const newT = [...curTodos, ...at, ...mt];
    const newE = curEmp.includes(name) ? curEmp : [...curEmp, name];
    persist(newT, newE);
    flash(`✅ ${name}さんの入社手続きTodo ${at.length+mt.length}件を生成しました`);
  };

  const toggleDone = (id) => {
    if (timers[id]) stopTimer(id);
    const todo = todos.find(t => t.id === id);
    const nowDone = !todo?.done;
    const updated = todos.map(t => t.id===id ? {...t, done:nowDone, doneAt: nowDone ? Date.now() : null} : t);
    persist(updated, null);
    if (nowDone && todo?.calEventId && GAS_URL) {
      fetch(GAS_URL, { method:"POST", body: JSON.stringify({action:"completeTodo", eventId:todo.calEventId, todoText:todo.text, person:todo.person}) }).catch(()=>{});
      flash("✅ 完了（カレンダーにも反映）");
    } else {
      flash(nowDone ? "✅ 完了にしました" : "↩ 未完了に戻しました");
    }
  };

  const startTimer = (id) => { setTimers(p => ({...p, [id]: Date.now()})); flash("タイマー開始"); };
  const stopTimer = (id) => {
    const added = Math.floor((Date.now()-timers[id])/1000);
    setTimers(p => { const n={...p}; delete n[id]; return n; });
    const updated = todos.map(t => t.id===id ? {...t, elapsed:(t.elapsed||0)+added} : t);
    persist(updated, null);
    flash(`タイマー停止 (+${fmt(added)})`);
  };

  const getElapsed = (todo) => (timers[todo.id] ? elapsed[todo.id] : null) ?? todo.elapsed ?? 0;

  const updateMemo = (id, memo) => {
    const updated = todos.map(t => t.id===id ? {...t, memo: memo || undefined} : t);
    persist(updated, null);
  };

  const handleSend = async (directMsg) => {
    const rawMsg = directMsg || input;
    if (!rawMsg.trim() || loading) return;
    if (!GAS_URL) { flash("❌ GAS URLが未設定です"); return; }
    const msg = rawMsg.trim();
    setInput("");
    const newMessages = [...messages, {role:"user", content:msg}];
    setMessages(newMessages);
    setLoading(true);
    const history = newMessages.filter(m => !m.options).map(m => ({role: m.role, content: m.content}));
    try {
      const res = await fetch(GAS_URL, {
        method: "POST",
        body: JSON.stringify({
          action: "aiChat",
          userMessage: msg,
          chatHistory: history,
          employees: employees,
          todos: todos
        })
      });
      const data = await res.json();
      if (data.error) {
        setMessages(p => [...p, {role:"assistant", content:"エラー: " + data.error}]);
      } else {
        const parsed = data.result;
        if (parsed.action === "ask") {
          setMessages(p => [...p, {role:"assistant", content: parsed.message, options: parsed.options}]);
        } else if (parsed.onboarding?.name) {
          genOnboarding(parsed.onboarding.name, parsed.onboarding.date||"", parsed.todos||todos, parsed.employees||employees);
          setMessages(p => [...p, {role:"assistant", content:`${parsed.onboarding.name}さんの入社手続きを開始しました！管理者・本人側のTodoを自動生成しています。`}]);
        } else {
          persist(parsed.todos||todos, parsed.employees||employees);
          setMessages(p => [...p, {role:"assistant", content: parsed.message||"更新しました"}]);
        }
      }
    } catch(e) {
      setMessages(p => [...p, {role:"assistant", content:"エラーが発生しました: "+e.message}]);
    }
    setLoading(false);
  };

  const timeStr = now.toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"});
  const dateStr = now.toLocaleDateString("ja-JP",{month:"long",day:"numeric",weekday:"short"});
  const cols = filter ? [filter] : ["管理者", ...employees];

  return (
    <div style={{ minHeight:"100vh", background:"#f0f4ff", color:"#334155", position:"relative" }}>
      {/* グリッド */}
      <div style={{ position:"fixed", inset:0, opacity:0.04, pointerEvents:"none",
        backgroundImage:"linear-gradient(#a5b4fc 1px,transparent 1px),linear-gradient(90deg,#a5b4fc 1px,transparent 1px)",
        backgroundSize:"48px 48px" }} />

      {/* ヘッダー */}
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center",
        padding:"14px 20px", background:"rgba(255,255,255,0.95)", backdropFilter:"blur(8px)",
        borderBottom:"1px solid #e2e8f0", position:"sticky", top:0, zIndex:50, boxShadow:"0 1px 4px rgba(0,0,0,0.04)" }}>
        <div style={{ display:"flex", alignItems:"center", gap:14, flexWrap:"wrap" }}>
          <div>
            <div style={{ fontSize:9, letterSpacing:4, color:"#4f6ef7", fontWeight:700 }}>圓子水産</div>
            <div style={{ fontSize:15, fontWeight:700, color:"#1e293b", letterSpacing:2 }}>TODO BOARD</div>
          </div>
          <div style={{ fontSize:9, color: GAS_URL?"#16a34a":"#64748b",
            border:`1px solid ${GAS_URL?"#bbf7d0":"#e2e8f0"}`, borderRadius:6, padding:"2px 8px",
            background: GAS_URL?"#f0fdf4":"#f8fafc" }}>
            {masterStatus}
          </div>
          {/* フィルター */}
          <div style={{ display:"flex", gap:4, flexWrap:"wrap" }}>
            {["全員","管理者",...employees].map(emp => (
              <button key={emp} onClick={() => setFilter(emp==="全員" ? null : (filter===emp?null:emp))}
                style={{ fontSize:10, padding:"3px 9px", borderRadius:20, cursor:"pointer",
                  border:`1px solid ${(emp==="全員"&&!filter)||(filter===emp)?"#4f6ef7":"#e2e8f0"}`,
                  background: (emp==="全員"&&!filter)||(filter===emp)?"#eef2ff":"#ffffff",
                  color: (emp==="全員"&&!filter)||(filter===emp)?"#4f46e5":"#64748b" }}>
                {emp==="全員"?"全員":emp.slice(0,3)}
              </button>
            ))}
          </div>
        </div>
        <div style={{ textAlign:"right", flexShrink:0 }}>
          <div style={{ fontSize:28, fontWeight:200, letterSpacing:3, color:"#1e293b" }}>{timeStr}</div>
          <div style={{ fontSize:10, color:"#64748b" }}>{dateStr}</div>
        </div>
      </div>

      {/* カラム */}
      <div style={{ display:"grid", gridTemplateColumns:`repeat(${cols.length}, minmax(150px, 1fr))`,
        gap:1, minHeight:"calc(100vh - 70px)", overflowX:"auto" }}>
        {cols.map((emp, ei) => {
          const col = COLORS[ei % COLORS.length];
          const empTodos = todos.filter(t => t.person===emp);
          const active = empTodos.filter(t => !t.done);
          const done   = empTodos.filter(t => t.done);
          return (
            <div key={emp}
              onDragOver={e => e.preventDefault()}
              onDrop={e => {
                e.preventDefault();
                const id = Number(e.dataTransfer.getData("todoId"));
                if (!id) return;
                const updated = todos.map(t => t.id===id ? {...t, person:emp} : t);
                persist(updated, null);
                flash(`→ ${emp} に移動しました`);
              }}
              style={{ background:"#f8fafc",
              borderRight: ei<cols.length-1?"1px solid #e2e8f0":"none",
              display:"flex", flexDirection:"column" }}>
              <div style={{ padding:"12px 12px 8px", borderBottom:`2px solid ${col}30`,
                background:`linear-gradient(180deg,${col}12 0%,transparent 100%)` }}>
                <div style={{ display:"flex", alignItems:"center", gap:7 }}>
                  <div style={{ width:7, height:7, borderRadius:"50%", background:col, boxShadow:`0 0 6px ${col}` }} />
                  <span style={{ fontSize:12, fontWeight:700, color:"#1e293b" }}>{emp}</span>
                  {emp==="管理者"&&<span style={{ fontSize:8, color:col, border:`1px solid ${col}40`,
                    borderRadius:4, padding:"1px 5px" }}>管理</span>}
                </div>
                <div style={{ display:"flex", gap:8, marginTop:3 }}>
                  <span style={{ fontSize:10, color:"#64748b" }}>未了 {active.length}</span>
                  <span style={{ fontSize:10, color:"#64748b" }}>完了 {done.length}</span>
                </div>
              </div>
              <div style={{ flex:1, padding:"8px", display:"flex", flexDirection:"column", overflowY:"auto" }}>
                {active.length===0&&done.length===0&&(
                  <div style={{ color:"#94a3b8", fontSize:11, textAlign:"center", paddingTop:20 }}>タスクなし</div>
                )}
                {active.map(todo => (
                  <TodoCard key={todo.id} todo={todo} col={col}
                    onToggle={toggleDone} onStart={startTimer} onStop={stopTimer}
                    isRunning={!!timers[todo.id]} elapsedSec={getElapsed(todo)}
                    onDragStart={()=>{}} onMemoChange={updateMemo} />
                ))}
                {done.length>0&&(
                  <div style={{ marginTop:6, borderTop:"1px solid #e2e8f0", paddingTop:6 }}>
                    {done.map(todo=>(
                      <TodoCard key={todo.id} todo={todo} col={col}
                        onToggle={toggleDone} isDone elapsedSec={getElapsed(todo)}
                        onMemoChange={updateMemo} />
                    ))}
                  </div>
                )}
              </div>
            </div>
          );
        })}
      </div>

      {/* フィードバック */}
      {feedback&&(
        <div style={{ position:"fixed", top:80, left:"50%", transform:"translateX(-50%)",
          background:"#ffffff", border:"1px solid #e2e8f0", borderRadius:10,
          padding:"10px 24px", fontSize:13, color:"#334155", zIndex:200, whiteSpace:"nowrap",
          boxShadow:"0 4px 12px rgba(0,0,0,0.1)" }}>
          {feedback}
        </div>
      )}

      {/* 管理ボタン */}
      {GAS_URL && <button onClick={syncNow} disabled={syncing} style={{
        position:"fixed", bottom:24, right:180,
        background:"#ffffff", border:"1px solid #99f6e4",
        borderRadius:14, padding:"12px 20px", color:"#0d9488",
        fontSize:13, letterSpacing:1, cursor:"pointer",
        boxShadow:"0 2px 8px rgba(0,0,0,0.06)",
        opacity: syncing ? 0.5 : 1 }}>{syncing ? "同期中…" : "🔄 カレンダー同期"}</button>}

      <button onClick={()=>setShowAdmin(true)} style={{
        position:"fixed", bottom:24, right:24,
        background:"#ffffff", border:"1px solid #c7d2fe",
        borderRadius:14, padding:"12px 20px", color:"#4f46e5",
        fontSize:13, letterSpacing:2, cursor:"pointer",
        boxShadow:"0 2px 8px rgba(0,0,0,0.06)" }}>⚙ Claude に指示</button>

      {/* 管理パネル */}
      {showAdmin&&(
        <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.3)",
          display:"flex", alignItems:"flex-end", justifyContent:"center", zIndex:300 }}
          onClick={()=>setShowAdmin(false)}>
          <div style={{ width:"100%", maxWidth:640, background:"#ffffff",
            borderRadius:"20px 20px 0 0", border:"1px solid #e2e8f0",
            padding:24, maxHeight:"65vh", display:"flex", flexDirection:"column",
            boxShadow:"0 -4px 20px rgba(0,0,0,0.1)" }}
            onClick={e=>e.stopPropagation()}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
              <div>
                <span style={{ fontSize:12, fontWeight:700, color:"#4f46e5", letterSpacing:3 }}>CLAUDE AI — Todo 管理</span>
                <div style={{ fontSize:10, color:"#64748b", marginTop:2 }}>社員 {employees.length}名 | Todo {todos.length}件</div>
              </div>
              <button onClick={()=>setShowAdmin(false)}
                style={{ background:"none", border:"none", color:"#94a3b8", cursor:"pointer", fontSize:20 }}>✕</button>
            </div>
            <div style={{ flex:1, overflowY:"auto", marginBottom:14, display:"flex", flexDirection:"column", gap:8 }}>
              {messages.length===0&&(
                <div style={{ color:"#64748b", fontSize:12, lineHeight:2.2, padding:"8px 0" }}>
                  💼 「田中さんが入社（4/1）」→ 入社手続きTodo自動生成<br/>
                  ✅ 「千葉さんの在庫チェックを完了にして」<br/>
                  ➕ 「小川さんに発注書確認を追加して」<br/>
                  🗑 「終わったやつ全部消して」<br/>
                  👤 「山田さんを社員に追加して」
                </div>
              )}
              {messages.map((m,i)=>(
                <div key={i} style={{ alignSelf: m.role==="user"?"flex-end":"flex-start", maxWidth:"82%" }}>
                  <div style={{
                    background: m.role==="user"?"#eef2ff":"#f8fafc",
                    border:`1px solid ${m.role==="user"?"#c7d2fe":"#e2e8f0"}`,
                    borderRadius:12, padding:"8px 14px", fontSize:13, color:"#1e293b"
                  }}>{m.content}</div>
                  {m.options&&m.options.length>0&&(
                    <div style={{ display:"flex", flexWrap:"wrap", gap:6, marginTop:6 }}>
                      {m.options.map((opt,j)=>(
                        <button key={j} onClick={()=>handleSend(opt)} style={{
                          background:"#eef2ff", border:"1px solid #c7d2fe", borderRadius:8,
                          padding:"6px 14px", fontSize:12, color:"#4f46e5", cursor:"pointer",
                          fontWeight:500
                        }}>{opt}</button>
                      ))}
                    </div>
                  )}
                </div>
              ))}
              {loading&&<div style={{ alignSelf:"flex-start", color:"#94a3b8", fontSize:12 }}>処理中…</div>}
              <div ref={msgEnd}/>
            </div>
            <div style={{ display:"flex", gap:8 }}>
              <input ref={inputRef} value={input}
                onChange={e=>setInput(e.target.value)}
                onKeyDown={e=>e.key==="Enter"&&handleSend()}
                placeholder="例：田中さんが入社（4/1）"
                style={{ flex:1, background:"#f8fafc", border:"1px solid #e2e8f0",
                  borderRadius:12, padding:"12px 16px", color:"#1e293b", fontSize:14, outline:"none" }}/>
              <button onClick={handleSend} disabled={loading} style={{
                background: loading?"#e2e8f0":"#4f46e5", border:"none",
                borderRadius:12, padding:"12px 22px", color:"#fff", cursor:"pointer",
                fontSize:14, fontWeight:600, opacity: loading?0.5:1 }}>送信</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
